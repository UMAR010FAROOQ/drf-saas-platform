name: Django CI

on:
  push:
  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    services:

      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

      redis:
        image: redis:7

        ports:
          - 6379:6379

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          python manage.py migrate

      - name: Run tests
        run: |
          pytest --cov=apps